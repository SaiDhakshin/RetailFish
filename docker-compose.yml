version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
    container_name: retailfish
    restart: unless-stopped
    expose:
      - "${FRONTEND_PORT}"
    networks:
      - trading-network

  backend:
    build:
      context: ./backend
    container_name: retailfish-backend
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "${API_PORT}"
    depends_on:
      - postgres
      - redis
    networks:
      - trading-network

  postgres:
    image: postgres:17
    container_name: retailfish-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - trading-network

  redis:
    image: redis:8-alpine
    container_name: retailfish-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - trading-network

  nginx:
    image: nginx:alpine
    container_name: retailfish-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - trading-network

volumes:
  postgres-data:

networks:
  trading-network:
    driver: bridge
